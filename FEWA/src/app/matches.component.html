<div class="container" style="margin-top: 70px">
  <!-- Add Match Button -->
  <div class="row">
    <div class="col-sm-12 text-end">
      <button *ngIf="isAuthenticated && isAdmin" class="btn btn-success" (click)="showAddMatchForm = !showAddMatchForm">
        {{ showAddMatchForm ? 'Cancel' : 'Add Match' }}
      </button>
    </div>
  </div>

  <!-- Add Match Form -->
  <div class="row" *ngIf="showAddMatchForm && isAuthenticated && isAdmin" style="margin-top: 20px">
    <div class="col-sm-12">
      <form (ngSubmit)="addMatch()">
        <div class="form-group">
          <label for="homeTeam">Home Team</label>
          <input type="text" id="homeTeam" class="form-control" [(ngModel)]="newMatch.HomeTeam" name="HomeTeam" required />
        </div>
        <div class="form-group">
          <label for="awayTeam">Away Team</label>
          <input type="text" id="awayTeam" class="form-control" [(ngModel)]="newMatch.AwayTeam" name="AwayTeam" required />
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" class="form-control" [(ngModel)]="newMatch.Date" name="Date" required />
        </div>
        <div class="form-group">
          <label for="videoURL">Video URL (optional)</label>
          <input type="url" id="videoURL" class="form-control" [(ngModel)]="newMatch.VideoURL" name="VideoURL" />
        </div>
        <button type="submit" class="btn btn-success mt-3">Submit</button>
      </form>
    </div>
  </div>
</div>

<div class="container" style="margin-top: 70px">
    <div class="row">
        <div class="col-sm-12">
            <div *ngFor="let match of match_list; trackBy: trackByMatchId" class="card mb-3">
                <div class="card mb-3" style="cursor: pointer"
                    [routerLink]="['/matches', match._id]">
                    <div class="card-header">
                        {{ match.HomeTeam }} vs {{ match.AwayTeam }}
                    </div>
                    <div class="card-body">
                        This match was at  
                        {{ match.HomeTeam }} 
                    </div>
                    <div class="card-footer">
                        Date: {{ match.Date }}
                    </div>
                </div>
            </div>
        </div> 
    </div>

    <div class="row">
        <div class="col-sm-4">
          <button class="btn btn-success" (click)="previousPage()">Previous</button>
        </div>
        <div class="col-sm-4 text-center">
            Showing page {{ page }} of {{ totalPages }}
        </div>
        <div class="col-sm-4 text-end">
          <button class="btn btn-success" (click)="nextPage()">Next</button>
        </div>
    </div>
</div>
