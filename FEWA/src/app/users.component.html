<div class="container" style="margin-top: 70px">
    <div class="row">
        <div class="col-sm-12 text-end">
            <button class="btn btn-info" *ngIf="isAuthenticated && isAdmin" (click)="showAddUserForm = !showAddUserForm">
                {{ showAddUserForm ? 'Cancel' : 'Add User' }}
            </button>
        </div>
    </div>

    <div class="row" *ngIf="showAddUserForm" style="margin-top: 20px">
        <div class="col-sm-12">
            <form (ngSubmit)="addUser()">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" [(ngModel)]="newUser.name" name="name" required />
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" [(ngModel)]="newUser.username" name="username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="text" id="password" class="form-control" [(ngModel)]="newUser.password" name="password" required />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" class="form-control" [(ngModel)]="newUser.email" name="email" required />
                </div>
                <div class="form-group">
                    <label for="admin">Admin</label>
                    <select id="admin" class="form-control" [(ngModel)]="newUser.admin" name="admin" required>
                        <option [value]="true">Yes</option>
                        <option [value]="false">No</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-info mt-3">Submit</button>
            </form>
        </div>
    </div>


<div class="container" style="margin-top: 70px">
    <div class="row">
        <div class="col-sm-12">
            <div *ngFor="let user of user_list" class="card mb-3" style="cursor: pointer">
                <div class="card mb-3" style="cursor: pointer"
                    [routerLink]="['/users', user._id]">
                    <div class="card-header">
                        User: {{ user.name }}
                    </div>
                    <div class="card-body">
                        Username: {{ user.username }}
                        <br>
                        Email: {{ user.email }}
                        <br>
                        Admin: {{ user.admin }}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-sm-4">
            <button class="btn-info" (click)="previousPage()">
                Previous
            </button>
        </div>
        <div class="col-sm-4 text-center align-self-center">
            Showing page {{ this.page }}
            of {{ totalPages }}
        </div>
        <div class="col-sm-4 text-end">
            <button class="btn-info" (click)="nextPage()">
                Next
            </button>
        </div>
    </div>
</div>
