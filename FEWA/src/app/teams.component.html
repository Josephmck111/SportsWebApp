<div class="container" style="margin-top: 70px">
  <!-- Add Match Button -->
  <div class="row">
    <div class="col-sm-12 text-end">
      <button *ngIf="isAuthenticated && isAdmin" class="btn btn-success" (click)="showAddTeamForm = !showAddTeamForm">
        {{ showAddTeamForm ? 'Cancel' : 'Add Team' }}
      </button>
    </div>
  </div>

  <!-- Add Match Form -->
  <div class="row" *ngIf="showAddTeamForm && isAuthenticated && isAdmin" style="margin-top: 20px">
    <div class="col-sm-12">
      <form (ngSubmit)="addTeam()">
        <div class="form-group">
          <label for="team">Team</label>
          <input type="text" id="team" class="form-control" [(ngModel)]="newTeam.Team" name="Team" required />
        </div>
        <div class="form-group">
          <label for="division">Division</label>
          <input type="text" id="division" class="form-control" [(ngModel)]="newTeam.Division" name="Division" required />
        </div>
        <div class="form-group">
          <label for="num_players">Players</label>
          <input type="text" id="num_players" class="form-control" [(ngModel)]="newTeam.Players" name="num_players" required />
        </div>
        <button type="submit" class="btn btn-success mt-3">Submit</button>
      </form>
    </div>
  </div>
</div>

<div class="container" style="margin-top: 70px">
    <div class="row">
        <div class="col-sm-12">
            <div *ngFor="let team of team_list; trackBy: trackByTeamId" class="card mb-3">
                <div class="card mb-3" style="cursor: pointer"
                    [routerLink]="['/teams', team._id]">
                    <div class="card-header">
                        Team: {{ team.Team }}
                    </div>
                    <div class="card-body">
                        Division: {{ team.Division }}
                        <br>
                        Players: {{ team.Players }}
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-sm-4">
            <button class="btn-success" (click)="previousPage()">
                Previous
            </button>
        </div>
        <div class="col-sm-4 text-center align-self-center">
            Showing page {{ page }} of {{ totalPages }}
        </div>
        <div class="col-sm-4 text-end">
            <button class="btn-success" (click)="nextPage()">
                Next
            </button>
        </div>
    </div>
</div>
