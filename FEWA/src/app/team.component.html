<div class="container" style="margin-top: 70px">
    <div class="row">
        <div class="col-sm-12">
            @for(team of team_list; track team.Team) {
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>Team: {{ team.Team }}</span>
                        <button 
                            class="btn-success" 
                            *ngIf="isAuthenticated && isAdmin"
                            (click)="toggleEditMode(team)">
                            {{ editingTeam === team ? 'Cancel' : 'Edit' }}
                        </button>
                    </div>
                    <div class="card-body" *ngIf="editingTeam !== team">
                        Division: {{ team.Division }}
                        <br>
                        Players: {{ team.Players }}
                    </div>
                    <div class="card-footer text-end">
                        <button class="btn btn-danger"
                                *ngIf="isAuthenticated && isAdmin" 
                                (click)="deleteTeam(team._id)">
                                Delete
                        </button>
                    </div>
                    <div class="card-body" *ngIf="editingTeam === team">
                        <form (ngSubmit)="saveChanges(team)">
                            <div class="form-group">
                                <label for="team">Team Name</label>
                                <input type="text" id="team" [(ngModel)]="team.Team" name="team" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="division">Division</label>
                                <input type="text" id="division" [(ngModel)]="team.Division" name="division" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="players">Players</label>
                                <textarea id="players" [(ngModel)]="team.Players" name="players" class="form-control" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn-success">Save</button>
                        </form>
                    </div>
                </div>
            }
        </div>
    </div>
    <button class="back-button" (click)="goBack()">Go Back</button>
</div>
