<div class="container" style="margin-top: 70px">
    <div class="row">
        <div class="col-sm-12">
            @for(user of user_list; track user.name) {
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>User: {{ user.name }}</span>
                        <button 
                            class="btn-success" 
                            *ngIf="isAuthenticated && isAdmin"
                            (click)="toggleEditMode(user)">
                            {{ editingUser === user ? 'Cancel' : 'Edit' }}
                        </button>
                    </div>
                    <div class="card-body" *ngIf="editingUser !== user">
                        Username: {{ user.username }}
                        <br>
                        Email: {{ user.email }}
                        <br>
                        Admin: {{ user.admin }}
                    </div>
                    <div class="card-footer text-end">
                        <button class="btn btn-danger" *ngIf="isAuthenticated && isAdmin" (click)="deleteUser(user._id)">Delete</button>
                    </div>
                    <div class="card-body" *ngIf="editingUser === user">
                        <form (ngSubmit)="saveChanges(user)">
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" [(ngModel)]="user.name" name="name" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" [(ngModel)]="user.username" name="username" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" [(ngModel)]="user.email" name="email" class="form-control" required />
                            </div>
                            <div class="form-group">
                                <label for="admin">Admin</label>
                                <select id="admin" [(ngModel)]="user.admin" name="admin" class="form-control">
                                    <option [value]="true">Yes</option>
                                    <option [value]="false">No</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-success">Save</button>
                        </form>
                    </div>
                </div>
            }
        </div>
    </div>
    <button class="back-button" (click)="goBack()">Go Back</button>
</div>
